{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Sistema de Planillas</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar (igual que dashboard) -->
        <aside class="sidebar">
            <div class="logo-sidebar">
                <img src="{% static 'img/logo_quadycons.png' %}" alt="Quadycons">
            </div>
            
            <nav class="nav-menu">
                <a href="{% url 'dashboard' %}" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    Dashboard
                </a>
                
                <a href="{% url 'perfil' %}" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    Mi Perfil
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <a href="{% url 'logout' %}" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Cerrar Sesión
                </a>
            </div>
        </aside>

        <!-- Contenido principal -->
        <main class="main-content">
            <header class="top-bar">
                <h1>Mi Perfil</h1>
            </header>

            <div class="content">
                {% if messages %}
                    {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                    </div>
                    {% endfor %}
                {% endif %}

                <div class="profile-container">
                    <div class="profile-card">
                        <div class="profile-header">
                            <div class="profile-avatar">
                                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                            </div>
                            <h2>{{ user.nombre_completo }}</h2>
                            <p class="profile-role">{{ user.get_rol_display }}</p>
                        </div>

                        <form method="POST" class="profile-form">
                            {% csrf_token %}
                            
                            <div class="form-group">
                                <label>Nombre completo</label>
                                <input 
                                    type="text" 
                                    name="nombre_completo" 
                                    value="{{ user.nombre_completo }}"
                                    required
                                >
                            </div>

                            <div class="form-group">
                                <label>Correo electrónico</label>
                                <input 
                                    type="email" 
                                    name="email" 
                                    value="{{ user.email }}"
                                    required
                                >
                            </div>

                            <div class="form-group">
                                <label>Rol</label>
                                <input 
                                    type="text" 
                                    value="{{ user.get_rol_display }}"
                                    disabled
                                >
                            </div>

                            <div class="form-group">
                                <label>Fecha de registro</label>
                                <input 
                                    type="text" 
                                    value="{{ user.fecha_creacion|date:'d/m/Y' }}"
                                    disabled
                                >
                            </div>

                            <button type="submit" class="btn btn-primary">
                                Actualizar perfil
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
